services:
  - type: web
    name: meetingmind-emotion-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 180
    envVars:
      - key: BACKEND_ENV
        value: production
