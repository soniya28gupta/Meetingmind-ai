name: meetingmind_ai
description: "MeetingMind AI - Production-grade AI Meeting Assistant."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.12.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  device_info_plus: ^10.1.0
  flutter_blue_plus: ^1.31.14
  permission_handler: ^11.3.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Network
  dio: ^5.5.0+1
  web_socket_channel: ^3.0.1

  # Audio Recording & Playback
  record: ^6.0.0
  just_audio: ^0.9.38
  audio_session: ^0.1.19

  # Background Processing
  flutter_background_service: ^5.0.7
  flutter_local_notifications: ^17.2.1+1

  # Firebase Integrations
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  google_sign_in: ^6.2.1

  # UI & Charts
  fl_chart: ^0.68.0
  intl: ^0.19.0
  uuid: ^4.4.0

  # Utilities & Exporters
  share_plus: ^12.0.2
  pdf: ^3.10.8
  file_picker: ^10.3.2
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.2.1
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.11
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env

